<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zad1</title>
</head>
<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: Arial, sans-serif;
  padding: 20px;
}

.container {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  grid-template-rows: repeat(12, 80px);
  gap: 10px;
  max-width: 900px;
  margin: 0 auto;
}

/* Desktop layout */
.a {
  grid-column: 1 / -1; /* full width */
  grid-row: span 2;
}

.b {
  grid-column: 1 / 9; /* wider */
  grid-row: span 4;
}

.c {
  grid-column: 9 / -1; /* narrower */
  grid-row: span 4;
}

.box {
  border: 3px solid black;
  background: #eaeaea;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2rem;
}

/* Mobile (<= 480px) */
@media (max-width: 480px) {
  .container {
    grid-template-columns: 1fr;
    grid-template-rows: auto;
  }

  .a, .b, .c {
    grid-column: 1 / -1;
    grid-row: auto;
  }

  .box {
    height: 100px;
  }
}
</style>
<body>
    <div class="container">
    <div class="box a">A</div>
        <div class="box b">B</div>
        <div class="box c">C</div>
    </div>


</body>
</html>
