<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive web</title>
</head>
<style>
*{
    margin: 0;
    box-sizing: border-box;
}

body{
    color: black;
    font-family: Arial, Helvetica, sans-serif;

}

.cont{
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    height: 100vh;
    

}

.cont>*,section{
padding: 10px;
}

header,footer{
    height: 10vh;
    background-color: #999;
    flex: 0 100%;
}

main{
height: 80vh;
display: flex;
justify-content: space-between;
flex-wrap: wrap;
flex: 0 100%;
}
section{
    background-color: azure;
    flex: 0 24%;
}
@media (max-width:1023) {
    section{
background-color: pink;
flex: 0 49%;
height: 48%;
    }

}
@media (max-width: 767px) {
    section:first-child,section:last-child{
        background-color: yellow;
        flex: 0 100%;
        height: 24%;
    }

}
@media (max-width:420px) {
    section{
background-color: aquamarine;
flex: 0 100%;
height: 24%;
    }
    section:first-child,section:last-child{
        
    }

}

</style>
<body>
    <div class="cont">
        <header>zaglavlje</header>
        <main>
            <section>1</section>
            <section>2</section>
            <section>3</section>
            <section>4</section>
        </main>
        <footer>podnozje</footer>
    </div>


</body>
</html>
