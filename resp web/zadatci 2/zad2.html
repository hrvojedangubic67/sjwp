<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zad 2</title>
</head>
<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: Arial, sans-serif;
  padding: 20px;
}

.container {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  grid-template-rows: repeat(12, 80px);
  gap: 10px;
  max-width: 900px;
  margin: 0 auto;
}


.a {
  grid-column: 1 / -1; 
  grid-row: span 2;
  background-color: purple;
}

.b {
  grid-column: 5 / 1; 
  grid-row: span 3;
  background-color: greenyellow;
}

.c {
  grid-column: 5 / 13; 
  grid-row: span 3;
  background-color: yellow;
}
.d{
grid-column: 1/-1;
grid-row: span 2;
background-color: blue;
}

.box {
  
  
  display: grid;
  text-align: center;
  font-size: 2rem;
}

@media ((max-width: 768px) and (min-width:480px)) {
  .container {
    grid-template-rows: auto;
    grid-template-rows: auto;
  }

  .b{
    width: 200px;
    height: 200px;
  }

  
}

@media (max-width: 480px) {
  .container {
    grid-template-columns: 1fr;
    grid-template-rows: auto;
  }

  .a, .b, .c {
    grid-column: 1 / -1;
    grid-row: auto;
  }

  .box {
    height: 100px;
  }
}
</style>
<body>
    <div class="container">
    <div class="box a">header</div>
        <div class="box b">sidebar</div>
        <div class="box c">main</div>
        <div class="box d">Footer</div>
    </div>


</body>
</html>
