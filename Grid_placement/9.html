<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Grid Layout</title>
  <link rel="stylesheet" href="style.css">
</head>
<style>
    body {
  background: #eee;
  font-family: Arial, sans-serif;
}

.container {
  width: 600px;
  margin: 50px auto;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-template-rows: 80px 80px 80px;
  gap: 10px;

  grid-template-areas:
    "a a b b"
    "c d f f"
    "e e e e";
}

.item {
  background: #444;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  border-radius: 6px;
}

/* Grid areas */
.a { grid-area: a; }
.b { grid-area: b; }
.c { grid-area: c; }
.d { grid-area: d; }
.e { grid-area: e; }

/* F element (preklapanje efekat) */
.f {
  grid-area: f;
  background: rgba(70, 110, 160, 0.9);
  z-index: 2;
  position: relative;
}

/* opcionalno: light overlay efekat */
.f::after {
  content: "";
  position: absolute;
  right: -10px;
  top: 0;
  width: 50%;
  height: 100%;
  background: rgba(120, 160, 210, 0.5);
  border-radius: 6px;
}
</style>
<body>

<div class="container">
  <div class="item a">A</div>
  <div class="item b">B</div>
  <div class="item c">C</div>
  <div class="item d">D</div>
  <div class="item e">E</div>
  <div class="item f">F</div>
</div>

</body>
</html>
