<!DOCTYPE html>
<html lang="en">
<head>

    <title>Document</title>

<style>
*{
    font-family: Arial, Helvetica, sans-serif;
    padding: 40px;
}
.box{
    background-color: grey;
    
    border-radius: 10px;
    display: flex;
    justify-content: space-evenly;
    align-items: center;
    font-size: 30px;
    margin: 15px;



}
.container{
display: grid;
grid-template-columns: repeat(3,1fr);
grid-template-rows: repeat(3,1fr);



}
.d{
    order: -3;
}
.f{
    order: 0;
}
.e{
    order: 2;
}
.c{
    order: 4;
}
.b{
    order: 3;
}
.ba {
    grid-column: span 2;
    
}
.bb{
    grid-row: span 2;
}

.aa{
    grid-column: span 2;
}
.bB{
    grid-row: span 2;
}
.e{
    grid-row: span 2;
    order:2;
}
.container1{
    width: 1000px;
display: grid;
grid-template-columns: repeat(4,1fr);
grid-template-rows: repeat(3,1fr);
}





</style>
