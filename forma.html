<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt Forma</title>

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #c100f1, #1bddff);
            font-family: Arial, sans-serif;
            min-height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .contact-form {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 700px;
        }

        .contact-form h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
            font-weight: bold;
        }

        .form-control {
            border-radius: 10px;
            padding: 12px;
        }

        .btn-custom {
            background-color: #007bff;
            color: white;
            border-radius: 10px;
            padding: 12px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-custom:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="contact-form mx-auto">

            
            <h2>Unesite vaše podatke</h2>

            
            <form method="GET">

                
                <div class="row mb-3">

                    
                    <div class="col-md-6">
                        <label for="ime" class="form-label">Ime</label>
                        <input type="text" class="form-control" id="ime" name="ime" placeholder="Unesite ime">
                    </div>

                    
                    <div class="col-md-6">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" name="email" placeholder="Unesite email">
                    </div>

                </div>

                
                <div class="mb-3">
                    <label for="poruka" class="form-label">Poruka</label>
                    <textarea class="form-control" id="poruka" name="poruka" rows="5" placeholder="Unesite vašu poruku"></textarea>
                </div>

                
                <div class="mb-4">
                    <label for="datum" class="form-label">Odaberite datum</label>
                    <input type="date" class="form-control" id="datum" name="datum">
                </div>

                
                <div class="d-grid">
                    <button type="submit" class="btn btn-custom">
                        Pošalji Poruku
                    </button>
                </div>

            </form>

        </div>
    </div>

</body>
</html>
